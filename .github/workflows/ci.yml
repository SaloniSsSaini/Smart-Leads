name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install & test server
        working-directory: server
        run: |
          npm ci
          npm run build
          npm test

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build client
        working-directory: client
        run: |
          npm ci
          npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [server, client]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd server && npm ci
          cd ../client && npm ci
      - name: Seed database
        working-directory: server
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/smart-leads-test
          JWT_SECRET: test-secret-min-32-characters-long!!
          SKIP_EMAIL_VERIFICATION: 'true'
          NODE_ENV: test
        run: npm run seed
      - name: Create server .env for E2E
        working-directory: server
        run: |
          cat > .env << 'EOF'
          MONGODB_URI=mongodb://127.0.0.1:27017/smart-leads-test
          JWT_SECRET=test-secret-min-32-characters-long!!
          SKIP_EMAIL_VERIFICATION=true
          PORT=5000
          CLIENT_URL=http://localhost:5173
          EOF
      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: client
        env:
          CI: true
        run: npm run test:e2e
